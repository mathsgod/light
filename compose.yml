services:
  mysql:
    image: mysql:8.0
    container_name: light-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test_password
      MYSQL_DATABASE: light_test
    ports:
      - "${LIGHT_TEST_MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ptest_password"]
      interval: 5s
      timeout: 5s
      retries: 10
